name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Package (smoke test)
        run: npx @vscode/vsce package --out live-glb-extension-ci.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: live-glb-extension-ci.vsix
          if-no-files-found: error
