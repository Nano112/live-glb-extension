name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Package VSIX
        run: npx @vscode/vsce package --out "live-glb-extension-${GITHUB_REF_NAME}.vsix"

      - name: Attach VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: live-glb-extension-*.vsix
          generate_release_notes: true

      - name: Publish to VSCode Marketplace (if VSCE_PAT secret set)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -n "$VSCE_PAT" ]; then
            npx @vscode/vsce publish --packagePath live-glb-extension-*.vsix
          else
            echo "VSCE_PAT not set — skipping Marketplace publish"
          fi

      - name: Publish to Open VSX (if OVSX_PAT secret set)
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -n "$OVSX_PAT" ]; then
            npx ovsx publish live-glb-extension-*.vsix -p "$OVSX_PAT"
          else
            echo "OVSX_PAT not set — skipping Open VSX publish"
          fi
